name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint (ruff format)
        run: ruff format --check src/ tests/

      - name: Lint (ruff check)
        run: ruff check src/ tests/ --select E,F,W,I --ignore E501

      - name: Type check (mypy)
        run: mypy src/ --ignore-missing-imports
        continue-on-error: true  # non-blocking until type coverage improves

      - name: Unit tests
        run: pytest tests/ -q --tb=short -m "not slow"

      - name: EA-DX schema validation (smoke)
        run: python -m eadx validate datasets/ 2>/dev/null || true

      - name: Notebook smoke tests
        run: |
          if find notebooks/ -name "*.ipynb" 2>/dev/null | grep -q .; then
            pytest --nbval notebooks/ -m smoke -q --tb=short
          else
            echo "No notebooks yet — skipping"
          fi

  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
          deny-licenses: GPL-3.0, AGPL-3.0
