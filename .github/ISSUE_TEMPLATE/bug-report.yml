name: Bug report
description: Report a broken notebook, failing test, or incorrect output
labels: ["bug"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      placeholder: Describe the bug and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Install with `pip install -e ".[dev]"`
        2. Run `pytest ...`
        3. See error
    validations:
      required: true
  - type: input
    id: python-version
    attributes:
      label: Python version
      placeholder: e.g. 3.11.4
  - type: textarea
    id: error-output
    attributes:
      label: Error output
      render: shell
